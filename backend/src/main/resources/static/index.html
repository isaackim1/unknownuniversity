<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fluxzero App</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #132033;
            --muted: #637086;
            --line: #d8e0ea;
            --paper: #ffffff;
            --wash: #f4f7fb;
            --teal: #176b87;
            --teal-strong: #0f5268;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--wash);
            color: var(--ink);
        }

        header {
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, .94);
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .bar,
        main {
            width: min(880px, calc(100% - 32px));
            margin: 0 auto;
        }

        .bar {
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .mark {
            width: 34px;
            height: 34px;
            border-radius: 7px;
            background: var(--teal);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 900;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: 18px;
        }

        .tenant {
            color: var(--muted);
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        main {
            padding: 32px 0 56px;
        }

        .panel {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 52px rgba(19, 32, 51, .08);
            overflow: hidden;
        }

        .panel-head {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
        }

        .panel-head h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .panel-head p {
            color: var(--muted);
            line-height: 1.5;
        }

        .status {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #e8f3f6;
            color: var(--teal);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .body {
            padding: 24px;
        }

        .details {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 12px 18px;
            margin: 0;
        }

        .details dt {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .details dd {
            margin: 0;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .actions {
            margin-top: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button {
            min-height: 40px;
            border: 0;
            border-radius: 6px;
            padding: 10px 14px;
            background: var(--teal);
            color: #fff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .button:hover {
            background: var(--teal-strong);
        }

        .secondary {
            background: #edf2f7;
            color: var(--ink);
        }

        .secondary:hover {
            background: #dfe8f1;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 680px) {
            .bar,
            .panel-head {
                align-items: stretch;
                flex-direction: column;
            }

            .details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="bar">
        <div class="brand">
            <div class="mark">FZ</div>
            <div>
                <h1>Fluxzero App</h1>
                <div class="tenant" id="tenantLine">tenant</div>
            </div>
        </div>
        <a id="logoutLink" class="button secondary hidden" href="/app/logout">Sign out</a>
    </div>
</header>

<main>
    <section id="signedOut" class="panel hidden">
        <div class="panel-head">
            <div>
                <h2>Signed out</h2>
                <p>Start a Fluxzero IDP session for this application.</p>
            </div>
            <span class="status">no session</span>
        </div>
        <div class="body">
            <a class="button" href="/app/login">Sign in</a>
        </div>
    </section>

    <section id="sessionPanel" class="panel hidden">
        <div class="panel-head">
            <div>
                <h2>Signed in</h2>
                <p id="subjectLine">Authenticated through Fluxzero IDP.</p>
            </div>
            <span class="status">BFF session</span>
        </div>
        <div class="body">
            <dl class="details">
                <dt>Subject</dt>
                <dd id="subjectValue"></dd>
                <dt>Role</dt>
                <dd id="roleValue"></dd>
                <dt>Name</dt>
                <dd id="nameValue"></dd>
                <dt>Email</dt>
                <dd id="emailValue"></dd>
                <dt>Issuer</dt>
                <dd id="issuerValue"></dd>
            </dl>
            <div class="actions">
                <a class="button secondary" href="/app/logout">Sign out</a>
            </div>
        </div>
    </section>
</main>

<script>
    const signedOut = document.getElementById('signedOut');
    const sessionPanel = document.getElementById('sessionPanel');
    const logoutLink = document.getElementById('logoutLink');
    const tenantLine = document.getElementById('tenantLine');
    const subjectLine = document.getElementById('subjectLine');
    const subjectValue = document.getElementById('subjectValue');
    const roleValue = document.getElementById('roleValue');
    const nameValue = document.getElementById('nameValue');
    const emailValue = document.getElementById('emailValue');
    const issuerValue = document.getElementById('issuerValue');

    async function loadSession() {
        const response = await fetch('/app/auth/session', { credentials: 'same-origin' });
        if (!response.ok) {
            signedOut.classList.remove('hidden');
            sessionPanel.classList.add('hidden');
            logoutLink.classList.add('hidden');
            return;
        }
        const session = await response.json();
        tenantLine.textContent = `tenant ${session.tenantId || 'default'}`;
        subjectLine.textContent = `Subject ${session.subject}`;
        subjectValue.textContent = session.subject || '-';
        roleValue.textContent = session.role || '-';
        nameValue.textContent = session.name || '-';
        emailValue.textContent = session.email || '-';
        issuerValue.textContent = session.issuer || '-';
        logoutLink.classList.remove('hidden');
        signedOut.classList.add('hidden');
        sessionPanel.classList.remove('hidden');
    }

    loadSession().catch(error => {
        console.error(error);
        signedOut.classList.remove('hidden');
    });
</script>
</body>
</html>
