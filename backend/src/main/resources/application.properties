spring.application.name=demo

# Fill these values with the real Fluxzero IDP tenant for deployed environments.
# Local tests get concrete defaults from the io.fluxzero.idp:test-support dependency.
# fluxzero.auth.external-base-url=<public application base URL>
# fluxzero.auth.oidc.issuer=<Fluxzero IDP tenant issuer URL>
# fluxzero.auth.oidc.client-id=<Fluxzero IDP client ID>
# fluxzero.auth.oidc.redirect-uri=<public application base URL>/app/callback
# fluxzero.auth.oidc.resource-audience=<public application base URL>/api
# fluxzero.auth.oidc.scope=openid profile email
# fluxzero.auth.oidc.login-state-secret=<shared 32+ character random secret for encrypted login-state cookies>
# fluxzero.auth.oidc.token-endpoint-auth-method=private_key_jwt
# fluxzero.auth.oidc.client-private-jwk=<RSA private JWK registered on the Fluxzero IDP client>
# fluxzero.auth.oidc.token-endpoint-audience=<optional token endpoint audience; defaults to the discovered token endpoint>
